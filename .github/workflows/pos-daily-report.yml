name: POS Daily Lark Report

on:
  schedule:
    # Both start ~6 min before their target so the report (checkout + setup +
    # fetch + render + send, observed ~3 min) has finished sending by the target
    # time, not just started. Offset off :00 -- GitHub's own docs warn
    # round-minute schedules are more likely to be delayed/dropped under load,
    # since many repos worldwide pick the same round times.
    - cron: "54 0 * * *"   # 00:54 UTC = ~07:54 Asia/Bangkok (targets 08:00)
    - cron: "54 10 * * *"  # 10:54 UTC = ~17:54 Asia/Bangkok (targets 18:00)
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Thai fonts (for rendering the report image)
        run: sudo apt-get update && sudo apt-get install -y fonts-thai-tlwg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run POS Daily report
        env:
          CODA_API_TOKEN: ${{ secrets.CODA_API_TOKEN }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_APP_ID_2: ${{ secrets.LARK_APP_ID_2 }}
          LARK_APP_SECRET_2: ${{ secrets.LARK_APP_SECRET_2 }}
          LARK_WEBHOOK_URL_2: ${{ secrets.LARK_WEBHOOK_URL_2 }}
        run: python scripts/coda_lark_report.py
